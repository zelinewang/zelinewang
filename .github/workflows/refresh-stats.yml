name: Refresh profile stats + snake

on:
  schedule:
    - cron: "0 4 * * *"  # daily at 04:00 UTC (after snake.yml at 00:00 UTC)
  workflow_dispatch:
  workflow_run:
    workflows: ["Generate Snake"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0  # need history to switch branches below

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Render all 3 mega-SVGs from templates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/render-profile.mjs

      - name: Stash rendered SVGs
        run: |
          set -eo pipefail
          mkdir -p /tmp/rendered
          mv previews/console/assets/01-profile.svg /tmp/rendered/console.svg
          mv previews/constellation/assets/01-profile.svg /tmp/rendered/constellation.svg
          mv previews/field-notes/assets/01-profile.svg /tmp/rendered/field-notes.svg

      - name: Switch to stats-output branch + commit + push
        run: |
          set -eo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Clean working tree so the branch switch is clean (orphan path
          # needs an empty working tree).
          git reset --hard HEAD
          git clean -fdx

          # Switch to stats-output (create as orphan if first run)
          if git ls-remote --exit-code origin stats-output >/dev/null 2>&1; then
            git fetch origin stats-output:stats-output
            git checkout stats-output
            git rm -rf . 2>/dev/null || true
          else
            git checkout --orphan stats-output
            git rm -rf . 2>/dev/null || true
          fi

          # Place fresh SVGs at their published paths
          mkdir -p studies
          mv /tmp/rendered/console.svg       studies/console.svg
          mv /tmp/rendered/constellation.svg studies/constellation.svg
          mv /tmp/rendered/field-notes.svg   studies/field-notes.svg

          git add studies/

          if git diff --staged --quiet; then
            echo "No changes; skipping commit."
            exit 0
          fi

          git commit -m "chore: refresh profile stats ($(date -u +%Y-%m-%d))"
          git push origin stats-output
