name: ZaneOS Sidekick

on:
  issues:
    types:
      - opened

permissions:
  issues: write
  contents: read

concurrency:
  group: sidekick-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  PER_USER_DAILY_LIMIT: 3       # max ZaneOS issues per author per 24h
  GLOBAL_DAILY_LIMIT: 50        # max ZaneOS issues across all authors per 24h
  AUTHOR_ALLOWLIST: "zelinewang" # space-separated handles bypass per-user limit (NOT global)

jobs:
  reply:
    if: startsWith(github.event.issue.title, 'ZaneOS ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ZANE_PERSONA.md
            .github/scripts
          sparse-checkout-cone-mode: false

      # ── RATE LIMIT GATE ─────────────────────────────────────────────────────
      # Counts ZaneOS-titled issues opened in the last 24h. Two checks: per-user
      # (with allowlist bypass) + global. Either trip = abort before model call.
      - name: Check rate limits
        id: rate-limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -eo pipefail

          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
               || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')

          ALLOW_HIT=0
          for h in $AUTHOR_ALLOWLIST; do
            if [ "$h" = "$ISSUE_AUTHOR" ]; then ALLOW_HIT=1; break; fi
          done

          if [ "$ALLOW_HIT" = "1" ]; then
            echo "Author $ISSUE_AUTHOR is on allowlist — skipping per-user limit check"
            USER_COUNT=0
          else
            USER_COUNT=$(gh search issues \
              --repo "$REPO_FULL" \
              --author "$ISSUE_AUTHOR" \
              --created ">$SINCE" \
              "ZaneOS in:title" \
              --json number --limit 100 \
              | jq 'length')
            echo "Author $ISSUE_AUTHOR opened $USER_COUNT ZaneOS issues in last 24h (limit: $PER_USER_DAILY_LIMIT)"
          fi

          GLOBAL_COUNT=$(gh search issues \
            --repo "$REPO_FULL" \
            --created ">$SINCE" \
            "ZaneOS in:title" \
            --json number --limit 100 \
            | jq 'length')
          echo "Global ZaneOS issues in last 24h: $GLOBAL_COUNT (limit: $GLOBAL_DAILY_LIMIT)"

          REASON=""
          if [ "$USER_COUNT" -ge "$PER_USER_DAILY_LIMIT" ] && [ "$ALLOW_HIT" != "1" ]; then
            REASON="user_limit"
          elif [ "$GLOBAL_COUNT" -ge "$GLOBAL_DAILY_LIMIT" ]; then
            REASON="global_limit"
          fi

          echo "user_count=$USER_COUNT" >> "$GITHUB_OUTPUT"
          echo "global_count=$GLOBAL_COUNT" >> "$GITHUB_OUTPUT"
          echo "limit_reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Post rate-limit refusal (if limited)
        if: steps.rate-limit.outputs.limit_reason != ''
        uses: actions/github-script@v9
        env:
          REASON: ${{ steps.rate-limit.outputs.limit_reason }}
          USER_COUNT: ${{ steps.rate-limit.outputs.user_count }}
          GLOBAL_COUNT: ${{ steps.rate-limit.outputs.global_count }}
        with:
          script: |
            const { REASON, USER_COUNT, GLOBAL_COUNT } = process.env;
            const messages = {
              user_limit:
                `_Daily limit reached for your handle (3 ZaneOS questions per 24h, you've opened ${USER_COUNT})._\n\n` +
                "This keeps the bot affordable and responsive for everyone. Try again tomorrow, " +
                "or check the FAQ on the [main profile](https://github.com/zelinewang/zelinewang) — " +
                "it likely covers what you're looking for.",
              global_limit:
                `_Daily quota reached across all askers today (${GLOBAL_COUNT}/50)._\n\n` +
                "The bot is rate-limited to protect against abuse and keep API costs predictable. " +
                "Try again tomorrow, or browse closed ZaneOS issues to read past replies.",
            };
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: messages[REASON],
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ["zaneos-rate-limited"],
            }).catch(() => {});
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: "closed",
              state_reason: "completed",
            });

      - name: Setup Node
        if: steps.rate-limit.outputs.limit_reason == ''
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install OpenAI SDK
        if: steps.rate-limit.outputs.limit_reason == ''
        run: npm install --no-save --no-fund openai@^4.79.0

      # SECURITY: all user-controlled inputs (issue title/body/author) flow via env vars
      # so they are passed as data to the shell, never interpolated into command strings.
      # See https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
      - name: Generate reply
        id: generate
        if: steps.rate-limit.outputs.limit_reason == ''
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          REPO_OWNER: ${{ github.event.repository.owner.login }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -eo pipefail

          PAYLOAD=$(jq -n \
            --arg t "$ISSUE_TITLE" \
            --arg b "$ISSUE_BODY" \
            --argjson n "$ISSUE_NUMBER" \
            --arg a "$ISSUE_AUTHOR" \
            --arg ro "$REPO_OWNER" \
            --arg rn "$REPO_NAME" \
            '{issueTitle: $t, issueBody: $b, issueNumber: $n, issueAuthor: $a, repoOwner: $ro, repoName: $rn}')

          REPLY_BODY=$(node .github/scripts/sidekick.mjs "$PAYLOAD" 2> mode.txt)
          MODE=$(grep '^MODE=' mode.txt | sed 's/^MODE=//')

          # Random heredoc delimiter avoids collision if model output ever contains
          # the literal marker text on a line by itself.
          EOF_MARKER="REPLY_EOF_$(openssl rand -hex 8)"
          {
            printf 'reply<<%s\n' "$EOF_MARKER"
            printf '%s\n' "$REPLY_BODY"
            printf '%s\n' "$EOF_MARKER"
            printf 'mode=%s\n' "$MODE"
          } >> "$GITHUB_OUTPUT"

      - name: Comment, label, and close
        if: steps.rate-limit.outputs.limit_reason == ''
        uses: actions/github-script@v9
        env:
          REPLY_BODY: ${{ steps.generate.outputs.reply }}
          MODE: ${{ steps.generate.outputs.mode }}
        with:
          script: |
            const { REPLY_BODY, MODE } = process.env;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: REPLY_BODY,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ["zaneos-sidequest", `mode-${MODE}`],
            }).catch(() => {});

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: "closed",
              state_reason: "completed",
            });

      - name: On failure, post a graceful error
        if: failure() && steps.rate-limit.outputs.limit_reason == ''
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                "_ZaneOS Sidekick hit a snag and could not generate a reply._",
                "",
                "If this looks like a real bug rather than a transient API hiccup,",
                "feel free to comment with what you tried and Zane will look at it.",
                "",
                `Run log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join("\n"),
            });
