<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Fleet — process listing for the multi-agent constellation</title>
  <desc id="desc">A terminal panel showing the constellix fleet of agents rendered as Unix processes via ps aux | grep agent.</desc>

  <defs>
    <pattern id="scanlines" x="0" y="0" width="2" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="2" y2="0" stroke="#0e1418" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="480" fill="#0a0e12"/>
  <rect width="1200" height="480" fill="url(#scanlines)" opacity="0.4"/>
  <rect x="20" y="20" width="1160" height="440" fill="#0d1217" stroke="#1c2530" stroke-width="0.5"/>

  <!-- ─── Status bar ─── -->
  <rect x="20" y="20" width="1160" height="32" fill="#11181f"/>
  <line x1="20" y1="52" x2="1180" y2="52" stroke="#1c2530" stroke-width="0.5"/>
  <circle cx="42" cy="36" r="5" fill="#3a4a5a"/>
  <circle cx="60" cy="36" r="5" fill="#3a4a5a"/>
  <circle cx="78" cy="36" r="5" fill="#3a4a5a"/>
  <text x="106" y="40" fill="#7d8a96"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.04em">~/constellix &#8212; tmux: agents (1/3)</text>
  <text x="1160" y="40" fill="#7d8a96" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.04em">[panel: fleet]</text>

  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace" font-size="14">

    <!-- Command -->
    <text x="46" y="92" fill="#5fb88a">~/constellix</text>
    <text x="170" y="92" fill="#7d8a96"> $</text>
    <text x="190" y="92" fill="#cdd5dd"> ps aux | grep "agent:" | sort -k 5 -r</text>

    <!-- header -->
    <text x="46" y="130" fill="#5a6573" font-size="11" letter-spacing="0.06em">USER     PID    STATE    %CPU   ROLE                  NAME</text>
    <line x1="46" y1="138" x2="1154" y2="138" stroke="#1c2530" stroke-width="0.5"/>

    <!-- Orion -->
    <text x="46"  y="168" fill="#7d8a96">zane</text>
    <text x="146" y="168" fill="#cdd5dd">d0c2</text>
    <text x="246" y="168" fill="#5fb88a">running</text>
    <text x="356" y="168" fill="#e8b063">22.4</text>
    <text x="446" y="168" fill="#a8b4c0">planner / scope</text>
    <text x="746" y="168" fill="#cdd5dd" font-weight="700">orion</text>

    <!-- Nova -->
    <text x="46"  y="198" fill="#7d8a96">zane</text>
    <text x="146" y="198" fill="#cdd5dd">d4a4</text>
    <text x="246" y="198" fill="#5fb88a">running</text>
    <text x="356" y="198" fill="#e8b063">68.1</text>
    <text x="446" y="198" fill="#a8b4c0">implement / TDD</text>
    <text x="746" y="198" fill="#cdd5dd" font-weight="700">nova</text>

    <!-- Designer -->
    <text x="46"  y="228" fill="#7d8a96">zane</text>
    <text x="146" y="228" fill="#cdd5dd">fbd7</text>
    <text x="246" y="228" fill="#5fb88a">running</text>
    <text x="356" y="228" fill="#e8b063">14.7</text>
    <text x="446" y="228" fill="#a8b4c0">visual QA / spec</text>
    <text x="746" y="228" fill="#cdd5dd" font-weight="700">designer</text>

    <!-- Sentinel -->
    <text x="46"  y="258" fill="#7d8a96">zane</text>
    <text x="146" y="258" fill="#cdd5dd">8900</text>
    <text x="246" y="258" fill="#5fb88a">running</text>
    <text x="356" y="258" fill="#e8b063">31.2</text>
    <text x="446" y="258" fill="#a8b4c0">review / security</text>
    <text x="746" y="258" fill="#cdd5dd" font-weight="700">sentinel</text>

    <!-- Maestro -->
    <text x="46"  y="288" fill="#7d8a96">zane</text>
    <text x="146" y="288" fill="#cdd5dd">6b59</text>
    <text x="246" y="288" fill="#7d8a96">sleep</text>
    <text x="356" y="288" fill="#e8b063">0.3</text>
    <text x="446" y="288" fill="#a8b4c0">post-mortem / verdict</text>
    <text x="746" y="288" fill="#cdd5dd" font-weight="700">maestro</text>

    <!-- Scout -->
    <text x="46"  y="318" fill="#7d8a96">zane</text>
    <text x="146" y="318" fill="#cdd5dd">6af1</text>
    <text x="246" y="318" fill="#7d8a96">sleep</text>
    <text x="356" y="318" fill="#e8b063">0.0</text>
    <text x="446" y="318" fill="#a8b4c0">research / on-demand</text>
    <text x="746" y="318" fill="#cdd5dd" font-weight="700">scout</text>

    <!-- Ops -->
    <text x="46"  y="348" fill="#7d8a96">zane</text>
    <text x="146" y="348" fill="#cdd5dd">b592</text>
    <text x="246" y="348" fill="#7d8a96">sleep</text>
    <text x="356" y="348" fill="#e8b063">0.0</text>
    <text x="446" y="348" fill="#a8b4c0">CI/CD / deploy</text>
    <text x="746" y="348" fill="#cdd5dd" font-weight="700">ops</text>

    <line x1="46" y1="376" x2="1154" y2="376" stroke="#1c2530" stroke-width="0.5"/>

    <!-- Insight comment -->
    <text x="46" y="404" fill="#5fb88a">~/constellix</text>
    <text x="170" y="404" fill="#7d8a96"> $</text>
    <text x="190" y="404" fill="#7d8a96"> # the constellation does the work — no single process is enough</text>

    <text x="46" y="438" fill="#5fb88a">~/constellix</text>
    <text x="170" y="438" fill="#7d8a96"> $</text>
    <rect x="190" y="426" width="9" height="14" fill="#e8b063">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
