  <!-- ═══════ § PHILOSOPHY ═══════ -->
  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace" font-size="14">
    <text x="46" y="1708" fill="#5a6573" font-size="10" letter-spacing="0.32em">§ &#160;06 &#160;PHILOSOPHY</text>

    <text x="46" y="1740" fill="#5fb88a">~/zelinewang</text>
    <text x="170" y="1740" fill="#7d8a96"> $</text>
    <text x="190" y="1740" fill="#cdd5dd"> cat doctrine/philosophy.txt | head -22</text>

    <text x="46" y="1772" fill="#7d8a96"># Operating doctrine — partial extract. Run "man agent-dao" for the full set.</text>

    <text x="46"  y="1812" fill="#cdd5dd">cut the noise.</text>
    <text x="306" y="1812" fill="#a8b4c0">consolidate what overlaps; simplify what is tangled.</text>

    <text x="46"  y="1848" fill="#cdd5dd">sharpen the tools first.</text>
    <text x="306" y="1848" fill="#a8b4c0">leverage beats brute force.</text>

    <text x="46"  y="1884" fill="#cdd5dd">prove before you argue.</text>
    <text x="306" y="1884" fill="#a8b4c0">replace debate with experiment.</text>

    <text x="46"  y="1920" fill="#cdd5dd">let reality disprove.</text>
    <text x="306" y="1920" fill="#a8b4c0">never defend a position; update it.</text>

    <text x="46"  y="1956" fill="#cdd5dd">solve the bottleneck.</text>
    <text x="306" y="1956" fill="#a8b4c0">defer everything else.</text>

    <text x="46"  y="1992" fill="#cdd5dd">hold the line.</text>
    <text x="306" y="1992" fill="#a8b4c0">especially alone.</text>

    <text x="46"  y="2028" fill="#cdd5dd">think in probabilities.</text>
    <text x="306" y="2028" fill="#a8b4c0">never deal in absolutes.</text>

    <text x="46"  y="2064" fill="#cdd5dd">leave leverage behind.</text>
    <text x="306" y="2064" fill="#a8b4c0">every delivery deposits something reusable.</text>

    <text x="46" y="2104" fill="#7d8a96"># EOF — 8 lines shown of 17.</text>
    <line x1="46" y1="2132" x2="1154" y2="2132" stroke="#1c2530" stroke-width="0.5"/>
  </g>

