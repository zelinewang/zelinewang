    <text x="46" y="2164" fill="#5a6573" font-size="10" letter-spacing="0.32em">§ &#160;07 &#160;SIDEKICK</text>

    <text x="46" y="2196" fill="#5fb88a">~/zelinewang</text>
    <text x="170" y="2196" fill="#7d8a96"> $</text>
    <text x="190" y="2196" fill="#cdd5dd"> zane query --help</text>

    <text x="46" y="2224" fill="#a8b4c0">Open an issue with title prefix </text>
    <text x="396" y="2224" fill="#e8b063">"ZaneOS &lt;mode&gt;: &lt;your input&gt;"</text>
    <text x="46" y="2244" fill="#a8b4c0">A workflow runs Claude-class model and replies in your issue (~30s).</text>
    <text x="46" y="2262" fill="#7d8a96">Limit: 3 questions per 24h per handle. 50 globally per 24h.</text>

    <text x="46"   y="2298" fill="#e8b063">ask</text>
    <text x="146"  y="2298" fill="#a8b4c0">a question about Zane's work, stack, philosophy</text>

    <text x="46"   y="2320" fill="#e8b063">match</text>
    <text x="146"  y="2320" fill="#a8b4c0">your GitHub handle in, one specific overlap angle out</text>

    <text x="46"   y="2342" fill="#e8b063">boop</text>
    <text x="146"  y="2342" fill="#a8b4c0">a few topics in, one useful-strange prototype idea out</text>

    <text x="46"   y="2364" fill="#e8b063">quest</text>
    <text x="146"  y="2364" fill="#a8b4c0">a topic in, a small technical challenge card out</text>
