<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">projects/ — directory listing</title>
  <desc id="desc">A terminal panel showing ls -la output for Zane's open projects, with annotations.</desc>

  <defs>
    <pattern id="scanlines" x="0" y="0" width="2" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="2" y2="0" stroke="#0e1418" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Chassis + screen -->
  <rect width="1200" height="460" fill="#0a0e12"/>
  <rect width="1200" height="460" fill="url(#scanlines)" opacity="0.4"/>
  <rect x="20" y="20" width="1160" height="420" fill="#0d1217" stroke="#1c2530" stroke-width="0.5"/>

  <!-- ─── Status bar ─── -->
  <rect x="20" y="20" width="1160" height="32" fill="#11181f"/>
  <line x1="20" y1="52" x2="1180" y2="52" stroke="#1c2530" stroke-width="0.5"/>
  <circle cx="42" cy="36" r="5" fill="#3a4a5a"/>
  <circle cx="60" cy="36" r="5" fill="#3a4a5a"/>
  <circle cx="78" cy="36" r="5" fill="#3a4a5a"/>
  <text x="106" y="40" fill="#7d8a96"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="11" letter-spacing="0.04em">~/zelinewang/projects &#8212; zsh</text>
  <text x="1160" y="40" fill="#7d8a96" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.04em">[panel: projects]</text>

  <!-- ─── Body ─── -->
  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="14">

    <!-- Command -->
    <text x="46" y="92" fill="#5fb88a">~/zelinewang</text>
    <text x="170" y="92" fill="#7d8a96"> $</text>
    <text x="190" y="92" fill="#cdd5dd"> ls -la projects/ --classify</text>

    <text x="46" y="116" fill="#7d8a96">total 6</text>

    <!-- header row, dim -->
    <text x="46" y="146" fill="#5a6573" font-size="11" letter-spacing="0.06em">PERMS  STARS  UPDATED       NAME                 DESCRIPTION</text>
    <line x1="46" y1="154" x2="1154" y2="154" stroke="#1c2530" stroke-width="0.5"/>

    <!-- ROW 1 — constellix (highlighted = primary star) -->
    <text x="46"   y="184" fill="#7d8a96">drwx</text>
    <text x="146"  y="184" fill="#e8b063">★ 12</text>
    <text x="244"  y="184" fill="#7d8a96">2026-04-30</text>
    <text x="394"  y="184" fill="#cdd5dd" font-weight="700">constellix/</text>
    <text x="600"  y="184" fill="#a8b4c0">multi-agent orchestration protocol</text>
    <text x="1144" y="184" fill="#5fb88a" text-anchor="end">→</text>

    <!-- ROW 2 — claudemem -->
    <text x="46"   y="214" fill="#7d8a96">drwx</text>
    <text x="146"  y="214" fill="#e8b063">★ 8</text>
    <text x="244"  y="214" fill="#7d8a96">2026-04-15</text>
    <text x="394"  y="214" fill="#cdd5dd" font-weight="700">claudemem/</text>
    <text x="600"  y="214" fill="#a8b4c0">persistent memory for AI agents</text>
    <text x="1144" y="214" fill="#5fb88a" text-anchor="end">→</text>

    <!-- ROW 3 — dev-orchestrator -->
    <text x="46"   y="244" fill="#7d8a96">drwx</text>
    <text x="146"  y="244" fill="#e8b063">★ 24</text>
    <text x="244"  y="244" fill="#7d8a96">2026-03-01</text>
    <text x="394"  y="244" fill="#cdd5dd" font-weight="700">dev-orchestrator/</text>
    <text x="600"  y="244" fill="#a8b4c0">one-command AI development lifecycle</text>
    <text x="1144" y="244" fill="#5fb88a" text-anchor="end">→</text>

    <!-- ROW 4 — FireSight -->
    <text x="46"   y="274" fill="#7d8a96">drwx</text>
    <text x="146"  y="274" fill="#e8b063">★ 4</text>
    <text x="244"  y="274" fill="#7d8a96">2025-11-12</text>
    <text x="394"  y="274" fill="#cdd5dd" font-weight="700">FireSight/</text>
    <text x="600"  y="274" fill="#a8b4c0">wildfire intelligence + NASA satellite data</text>
    <text x="1144" y="274" fill="#5fb88a" text-anchor="end">→</text>

    <!-- ROW 5 — PulseConnect -->
    <text x="46"   y="304" fill="#7d8a96">drwx</text>
    <text x="146"  y="304" fill="#e8b063">★ 2</text>
    <text x="244"  y="304" fill="#7d8a96">2025-08-04</text>
    <text x="394"  y="304" fill="#cdd5dd" font-weight="700">PulseConnect/</text>
    <text x="600"  y="304" fill="#a8b4c0">computer-using AI outreach concept</text>
    <text x="1144" y="304" fill="#5fb88a" text-anchor="end">→</text>

    <!-- ROW 6 — santorini -->
    <text x="46"   y="334" fill="#7d8a96">drwx</text>
    <text x="146"  y="334" fill="#e8b063">★ 1</text>
    <text x="244"  y="334" fill="#7d8a96">2024-09-22</text>
    <text x="394"  y="334" fill="#cdd5dd" font-weight="700">santorini/</text>
    <text x="600"  y="334" fill="#a8b4c0">board-game logic, clean state machines</text>
    <text x="1144" y="334" fill="#5fb88a" text-anchor="end">→</text>

    <!-- divider before next prompt -->
    <line x1="46" y1="362" x2="1154" y2="362" stroke="#1c2530" stroke-width="0.5"/>

    <!-- Hint line -->
    <text x="46" y="390" fill="#5fb88a">~/zelinewang</text>
    <text x="170" y="390" fill="#7d8a96"> $</text>
    <text x="190" y="390" fill="#7d8a96"> # click any row above to open the repo on github.com</text>

    <!-- Final prompt with cursor -->
    <text x="46" y="424" fill="#5fb88a">~/zelinewang</text>
    <text x="170" y="424" fill="#7d8a96"> $</text>
    <rect x="190" y="412" width="9" height="14" fill="#e8b063">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
