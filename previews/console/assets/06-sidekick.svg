<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">zane query — sidekick affordance</title>
  <desc id="desc">A terminal panel with the zane query command interface, showing prepared question shortcuts and a blinking cursor.</desc>

  <defs>
    <pattern id="scanlines" x="0" y="0" width="2" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="2" y2="0" stroke="#0e1418" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="#0a0e12"/>
  <rect width="1200" height="320" fill="url(#scanlines)" opacity="0.4"/>
  <rect x="20" y="20" width="1160" height="280" fill="#0d1217" stroke="#1c2530" stroke-width="0.5"/>

  <rect x="20" y="20" width="1160" height="32" fill="#11181f"/>
  <line x1="20" y1="52" x2="1180" y2="52" stroke="#1c2530" stroke-width="0.5"/>
  <circle cx="42" cy="36" r="5" fill="#3a4a5a"/>
  <circle cx="60" cy="36" r="5" fill="#3a4a5a"/>
  <circle cx="78" cy="36" r="5" fill="#3a4a5a"/>
  <text x="106" y="40" fill="#7d8a96"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.04em">~/zelinewang &#8212; sidekick (deepseek-v4-flash, ~30s)</text>
  <text x="1160" y="40" fill="#7d8a96" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.04em">[panel: sidekick]</text>

  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace" font-size="14">

    <!-- Help line -->
    <text x="46" y="92" fill="#5fb88a">~/zelinewang</text>
    <text x="170" y="92" fill="#7d8a96"> $</text>
    <text x="190" y="92" fill="#cdd5dd"> zane query --help</text>

    <text x="46" y="120" fill="#a8b4c0">Open an issue with title prefix </text>
    <text x="396" y="120" fill="#e8b063">"ZaneOS &lt;mode&gt;: &lt;your input&gt;"</text>
    <text x="46" y="138" fill="#a8b4c0">A workflow runs Claude-class model and replies in your issue (~30s).</text>
    <text x="46" y="156" fill="#7d8a96">Limit: 3 questions per 24h per handle. 50 globally per 24h.</text>

    <!-- Mode listing -->
    <text x="46" y="196" fill="#5fb88a">~/zelinewang</text>
    <text x="170" y="196" fill="#7d8a96"> $</text>
    <text x="190" y="196" fill="#cdd5dd"> zane query --modes</text>

    <text x="46"   y="224" fill="#e8b063">ask</text>
    <text x="146"  y="224" fill="#a8b4c0">a question about Zane's work, stack, philosophy, or how he thinks about something</text>

    <text x="46"   y="246" fill="#e8b063">match</text>
    <text x="146"  y="246" fill="#a8b4c0">your GitHub handle in, one specific overlap angle out</text>

    <text x="46"   y="268" fill="#e8b063">boop</text>
    <text x="146"  y="268" fill="#a8b4c0">a few topics in, one useful-strange prototype idea out</text>

    <text x="46"   y="290" fill="#e8b063">quest</text>
    <text x="146"  y="290" fill="#a8b4c0">a topic in, a small technical challenge card out</text>

    <!-- Final prompt with cursor -->
    <text x="46" y="312" fill="#5fb88a" font-size="0">cursor</text>
  </g>
</svg>
