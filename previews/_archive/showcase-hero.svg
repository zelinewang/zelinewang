<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Showcase index — three vibe-coded directions for one profile</title>
  <desc id="desc">Index hero showing three preview tiles side-by-side: Field Notes (paper), Constellation (deep space), Console (terminal).</desc>

  <defs>
    <linearGradient id="bgWash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#efece6"/>
    </linearGradient>
    <!-- Field Notes mini-tile gradient -->
    <linearGradient id="tileFN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e9"/>
      <stop offset="100%" stop-color="#f0e7d0"/>
    </linearGradient>
    <!-- Console mini-tile gradient -->
    <linearGradient id="tileC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1217"/>
      <stop offset="100%" stop-color="#0a0e12"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bgWash)"/>

  <!-- Top label -->
  <text x="64" y="48" fill="#7a7568"
        font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="0.28em">SHOWCASE &#160; INDEX</text>
  <text x="1136" y="48" fill="#7a7568" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="0.18em">3 directions · 1 profile</text>

  <line x1="64" y1="68" x2="1136" y2="68" stroke="#1f1c14" stroke-opacity="0.10" stroke-width="0.6"/>

  <!-- Headline -->
  <text x="64" y="138" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="58" font-weight="500" letter-spacing="-0.018em">One profile, three directions.</text>

  <text x="64" y="174" fill="#7a7568"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
        font-size="15" letter-spacing="0.04em">
    Vibe-coded README experiments — built to demonstrate the constraint surface of GitHub profiles.
  </text>

  <!-- Three preview tiles, side-by-side -->
  <!-- Tile 1: Field Notes (paper) -->
  <g transform="translate(64, 208)">
    <rect width="346" height="86" fill="url(#tileFN)" stroke="#1f1c14" stroke-opacity="0.12"/>
    <text x="20" y="28" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">A · FIELD &#160;NOTES</text>
    <text x="20" y="56" fill="#1f1c14"
          font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif"
          font-size="22" font-weight="500" letter-spacing="-0.01em">Editorial &#183; restrained</text>
    <text x="20" y="76" fill="#7a7568"
          font-family="-apple-system, sans-serif" font-size="12">paper · ink stamp · marginalia</text>
  </g>

  <!-- Tile 2: Constellation (deep space) -->
  <g transform="translate(427, 208)">
    <rect width="346" height="86" fill="#0a1018" stroke="#2a3340"/>
    <!-- 3 mini twinkling stars in the tile -->
    <circle cx="42" cy="50" r="2.5" fill="#fdfaf2">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="34" r="1.8" fill="#fdfaf2">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4.1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="84" cy="58" r="3.2" fill="#f0b67a">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.7s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <line x1="42" y1="50" x2="64" y2="34" stroke="#3a4a5e" stroke-width="0.5"/>
    <line x1="64" y1="34" x2="84" y2="58" stroke="#3a4a5e" stroke-width="0.5"/>
    <text x="120" y="28" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">B · CONSTELLATION</text>
    <text x="120" y="56" fill="#fdfaf2"
          font-family="-apple-system, BlinkMacSystemFont, sans-serif"
          font-size="22" font-weight="500" letter-spacing="-0.01em">Each agent &#183; a star</text>
    <text x="120" y="76" fill="#7a8694"
          font-family="-apple-system, sans-serif" font-size="12">starmap · SMIL twinkle · deep space</text>
  </g>

  <!-- Tile 3: Console (terminal) -->
  <g transform="translate(790, 208)">
    <rect width="346" height="86" fill="url(#tileC)" stroke="#1c2530"/>
    <text x="20" y="28" fill="#5fb88a"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">C · CONSOLE</text>
    <text x="20" y="56" fill="#cdd5dd"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="22" font-weight="500" letter-spacing="-0.01em">$ man zane</text>
    <text x="20" y="76" fill="#7d8a96"
          font-family="-apple-system, sans-serif" font-size="12">phosphor · scanlines · cursor</text>
    <!-- Blinking cursor in the tile -->
    <rect x="190" y="44" width="7" height="14" fill="#e8b063">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
