<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Operating doctrine — eight axioms</title>
  <desc id="desc">A notebook page with eight short axioms from the Agent Dao, presented in a two-column hand-set layout.</desc>

  <defs>
    <linearGradient id="paperWash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fbf6e9"/>
      <stop offset="60%" stop-color="#f6efde"/>
      <stop offset="100%" stop-color="#efe6cf"/>
    </linearGradient>
    <pattern id="grain" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="22"  cy="38"  r="0.5" fill="#1f1c14" opacity="0.04"/>
      <circle cx="58"  cy="14"  r="0.4" fill="#1f1c14" opacity="0.05"/>
      <circle cx="91"  cy="60"  r="0.5" fill="#1f1c14" opacity="0.03"/>
      <circle cx="129" cy="29"  r="0.4" fill="#1f1c14" opacity="0.05"/>
      <circle cx="14"  cy="93"  r="0.5" fill="#1f1c14" opacity="0.04"/>
      <circle cx="73"  cy="111" r="0.4" fill="#1f1c14" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#paperWash)"/>
  <rect width="1200" height="600" fill="url(#grain)"/>

  <text x="64" y="42" fill="#7d7560"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.32em">DOCTRINE</text>
  <text x="1136" y="42" fill="#7d7560" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">PAGE &#160;6</text>
  <line x1="64" y1="58" x2="1136" y2="58" stroke="#1f1c14" stroke-opacity="0.18" stroke-width="0.6"/>

  <!-- Title -->
  <text x="64" y="108" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif"
        font-size="36" font-weight="500" letter-spacing="-0.015em">Eight working principles</text>
  <text x="64" y="138" fill="#7d7560"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif"
        font-style="italic" font-size="14">
    Partial extract — the full set lives in the Agent Dao manual.
  </text>

  <!-- 2 columns of axioms -->
  <!-- Column 1 (left) -->
  <g transform="translate(64, 200)">
    <!-- Axiom 1 -->
    <text x="0" y="0" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">I.</text>
    <text x="40" y="2" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">cut the noise.</text>
    <text x="40" y="28" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">consolidate what overlaps; simplify what is tangled.</text>

    <!-- Axiom 2 -->
    <text x="0" y="80" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">II.</text>
    <text x="40" y="82" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">sharpen the tools first.</text>
    <text x="40" y="108" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">leverage beats brute force.</text>

    <!-- Axiom 3 -->
    <text x="0" y="160" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">III.</text>
    <text x="40" y="162" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">prove before you argue.</text>
    <text x="40" y="188" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">replace debate with experiment.</text>

    <!-- Axiom 4 -->
    <text x="0" y="240" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">IV.</text>
    <text x="40" y="242" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">let reality disprove.</text>
    <text x="40" y="268" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">never defend a position; update it.</text>
  </g>

  <!-- Column 2 (right) -->
  <g transform="translate(640, 200)">
    <!-- Axiom 5 -->
    <text x="0" y="0" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">V.</text>
    <text x="40" y="2" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">solve the bottleneck.</text>
    <text x="40" y="28" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">defer everything else.</text>

    <!-- Axiom 6 -->
    <text x="0" y="80" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">VI.</text>
    <text x="40" y="82" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">hold the line.</text>
    <text x="40" y="108" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">especially alone.</text>

    <!-- Axiom 7 -->
    <text x="0" y="160" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">VII.</text>
    <text x="40" y="162" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">think in probabilities.</text>
    <text x="40" y="188" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">never deal in absolutes.</text>

    <!-- Axiom 8 -->
    <text x="0" y="240" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">VIII.</text>
    <text x="40" y="242" fill="#1f1c14" font-family="Charter, Cambria, Georgia, serif" font-size="20" font-weight="600">leave leverage behind.</text>
    <text x="40" y="268" fill="#7d7560" font-family="Charter, Cambria, Georgia, serif" font-style="italic" font-size="14">every delivery deposits something reusable.</text>
  </g>

  <!-- Footer -->
  <line x1="64" y1="540" x2="1136" y2="540" stroke="#1f1c14" stroke-opacity="0.18" stroke-width="0.6"/>
  <text x="600" y="568" fill="#7d7560" text-anchor="middle"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif"
        font-style="italic" font-size="14">
    "the system should outlast any individual operator."
  </text>
</svg>
