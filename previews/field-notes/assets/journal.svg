<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Field Notes — Zane Wang's research journal</title>
  <desc id="desc">An editorial field-journal hero with a single ink-stamp drop animation on load. Restrained, paper-textured.</desc>

  <defs>
    <!-- Warm paper gradient -->
    <linearGradient id="paperWash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fbf6e9"/>
      <stop offset="50%" stop-color="#f6efde"/>
      <stop offset="100%" stop-color="#efe6cf"/>
    </linearGradient>

    <!-- Subtle paper texture (tiny noise dots) -->
    <pattern id="grain" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="22"  cy="38"  r="0.5" fill="#1f1c14" opacity="0.04"/>
      <circle cx="58"  cy="14"  r="0.4" fill="#1f1c14" opacity="0.05"/>
      <circle cx="91"  cy="60"  r="0.5" fill="#1f1c14" opacity="0.03"/>
      <circle cx="129" cy="29"  r="0.4" fill="#1f1c14" opacity="0.05"/>
      <circle cx="14"  cy="93"  r="0.5" fill="#1f1c14" opacity="0.04"/>
      <circle cx="73"  cy="111" r="0.4" fill="#1f1c14" opacity="0.05"/>
      <circle cx="119" cy="86"  r="0.5" fill="#1f1c14" opacity="0.03"/>
      <circle cx="38"  cy="142" r="0.4" fill="#1f1c14" opacity="0.04"/>
      <circle cx="100" cy="148" r="0.5" fill="#1f1c14" opacity="0.05"/>
      <circle cx="148" cy="124" r="0.4" fill="#1f1c14" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="380" fill="url(#paperWash)"/>
  <rect width="1200" height="380" fill="url(#grain)"/>

  <!-- Top hairline rule -->
  <line x1="64" y1="58" x2="1136" y2="58" stroke="#1f1c14" stroke-opacity="0.18" stroke-width="0.6"/>

  <!-- Top index — single line -->
  <text x="64" y="42" fill="#7d7560"
        font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="0.32em">FIELD &#160;NOTES</text>
  <text x="1136" y="42" fill="#7d7560" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="0.18em">VOL. III &#160; 2026</text>

  <!-- Hero title — large serif -->
  <text x="64" y="158" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="86" font-weight="500" letter-spacing="-0.018em">Zane Wang</text>

  <!-- Subtitle -->
  <text x="64" y="195" fill="#7d7560"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif"
        font-size="14" letter-spacing="0.06em">a working notebook · agents · maps · sensors · tools</text>

  <!-- Main body line — italic serif -->
  <text x="64" y="262" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-style="italic" font-size="24" font-weight="400" letter-spacing="-0.005em">
    I am a researcher of fuzzy systems.
  </text>
  <text x="64" y="296" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="20" font-weight="400">
    These pages are observations from the field.
  </text>

  <!-- Bottom hairline -->
  <line x1="64" y1="334" x2="1136" y2="334" stroke="#1f1c14" stroke-opacity="0.18" stroke-width="0.6"/>
  <text x="64" y="356" fill="#7d7560"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">EST. &#160;2021</text>
  <text x="1136" y="356" fill="#7d7560" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">SCROLL &#160;FOR &#160;ENTRIES &#160;&#x2193;</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- INK-STAMP DROP — fires once on load, then static -->
  <!-- Carmine red, top-right, slight rotation         -->
  <!-- ─────────────────────────────────────────────── -->
  <g transform="translate(1010, 130) rotate(-8)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.85;0.85" keyTimes="0;0.45;0.55;1" dur="1.6s" fill="freeze"/>
    <!-- Stamp ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#a13a28" stroke-width="2.5" stroke-opacity="0.85"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#a13a28" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- Stamp text -->
    <text x="0" y="-8" text-anchor="middle" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="9" font-weight="700" letter-spacing="0.18em">CURRENTLY</text>
    <text x="0" y="6" text-anchor="middle" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="0.06em">IN THE FIELD</text>
    <text x="0" y="22" text-anchor="middle" fill="#a13a28"
          font-family="ui-monospace, monospace" font-size="8" letter-spacing="0.18em">·  ·  ·</text>
  </g>
</svg>
