<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Send a letter — sidekick affordance</title>
  <desc id="desc">A field-journal page with an envelope sketch and an invitation to send a letter to the sidekick (open an issue).</desc>

  <defs>
    <linearGradient id="paperWash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fbf6e9"/>
      <stop offset="60%" stop-color="#f6efde"/>
      <stop offset="100%" stop-color="#efe6cf"/>
    </linearGradient>
    <pattern id="grain" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="22"  cy="38"  r="0.5" fill="#1f1c14" opacity="0.04"/>
      <circle cx="58"  cy="14"  r="0.4" fill="#1f1c14" opacity="0.05"/>
      <circle cx="91"  cy="60"  r="0.5" fill="#1f1c14" opacity="0.03"/>
      <circle cx="129" cy="29"  r="0.4" fill="#1f1c14" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#paperWash)"/>
  <rect width="1200" height="320" fill="url(#grain)"/>

  <text x="64" y="42" fill="#7d7560"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.32em">CORRESPONDENCE</text>
  <text x="1136" y="42" fill="#7d7560" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">PAGE &#160;7</text>
  <line x1="64" y1="58" x2="1136" y2="58" stroke="#1f1c14" stroke-opacity="0.18" stroke-width="0.6"/>

  <!-- Left: copy -->
  <text x="64" y="118" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif"
        font-size="32" font-weight="500" letter-spacing="-0.012em">Send a letter.</text>
  <text x="64" y="158" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif" font-size="15">
    To send a letter — questions about the work, ideas to collaborate on,
  </text>
  <text x="64" y="178" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif" font-size="15">
    something you would like another set of eyes on — there is a sidekick
  </text>
  <text x="64" y="198" fill="#1f1c14"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif" font-size="15">
    that replies in a GitHub issue thread.
  </text>

  <text x="64" y="232" fill="#7d7560"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif"
        font-style="italic" font-size="14">
    The reply takes about thirty seconds — the time a postal courier needs
  </text>
  <text x="64" y="252" fill="#7d7560"
        font-family="Charter, 'Iowan Old Style', Cambria, Georgia, serif"
        font-style="italic" font-size="14">
    to walk to the next house.
  </text>

  <text x="64" y="290" fill="#a13a28"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">→ &#160;CLICK ANYWHERE TO POST A LETTER</text>

  <!-- Right: envelope sketch -->
  <g transform="translate(900, 90)">
    <!-- Envelope outline -->
    <rect x="0" y="0" width="240" height="160" fill="#fbf6e9" stroke="#1f1c14" stroke-opacity="0.5" stroke-width="0.8"/>
    <!-- Envelope flap -->
    <polyline points="0,0 120,90 240,0" fill="none" stroke="#1f1c14" stroke-opacity="0.5" stroke-width="0.8"/>
    <!-- Wax stamp / seal -->
    <g transform="translate(120, 130) rotate(-8)">
      <circle r="22" fill="#a13a28" opacity="0.85"/>
      <text x="0" y="-2" text-anchor="middle" fill="#fbf6e9"
            font-family="ui-monospace, monospace" font-size="8" font-weight="700" letter-spacing="0.12em">ZANE</text>
      <text x="0" y="10" text-anchor="middle" fill="#fbf6e9"
            font-family="ui-monospace, monospace" font-size="8" font-weight="700" letter-spacing="0.12em">OS</text>
    </g>
    <!-- Address lines (to recipient) -->
    <line x1="20"  y1="115" x2="100" y2="115" stroke="#1f1c14" stroke-opacity="0.3" stroke-width="0.5"/>
    <line x1="20"  y1="128" x2="90"  y2="128" stroke="#1f1c14" stroke-opacity="0.3" stroke-width="0.5"/>
    <line x1="20"  y1="141" x2="80"  y2="141" stroke="#1f1c14" stroke-opacity="0.3" stroke-width="0.5"/>

    <!-- Caption -->
    <text x="120" y="190" text-anchor="middle" fill="#7d7560"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">VIA &#160;DEEPSEEK V4</text>
  </g>
</svg>
