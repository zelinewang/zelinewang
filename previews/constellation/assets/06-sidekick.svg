<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Transmit signal — sidekick affordance</title>
  <desc id="desc">An interferometer-style panel inviting the visitor to transmit a signal (open an issue) to the sidekick. Includes a slowly pulsing transmission ring.</desc>

  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e1822" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070b10" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="#0a1018"/>
  <rect width="1200" height="320" fill="url(#vignette)"/>

  <text x="40" y="42" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.28em">TRANSMIT &#160;SIGNAL</text>
  <text x="1160" y="42" fill="#7a8694" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">RELAY &#160;DEEPSEEK-V4-FLASH</text>
  <line x1="40" y1="58" x2="1160" y2="58" stroke="#2a3340" stroke-width="0.5"/>

  <!-- ─── LEFT: copy ─── -->
  <text x="40" y="120" fill="#fdfaf2"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="28" font-weight="500" letter-spacing="-0.018em">Send a signal to the constellation.</text>
  <text x="40" y="156" fill="#a0aab6"
        font-family="-apple-system, sans-serif" font-size="14">Open an issue with title prefix</text>
  <text x="280" y="156" fill="#f0b67a"
        font-family="ui-monospace, monospace" font-size="14">"ZaneOS &lt;mode&gt;: &lt;your input&gt;"</text>
  <text x="40" y="178" fill="#a0aab6"
        font-family="-apple-system, sans-serif" font-size="14">A workflow with Claude-class model decodes and transmits a reply (~30s round-trip).</text>

  <!-- meta line -->
  <text x="40" y="220" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">MODES &#160;ASK &#160;·&#160;  MATCH &#160;·&#160;  BOOP &#160;·&#160;  QUEST</text>
  <text x="40" y="240" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">QUOTA &#160;3 / 24h PER HANDLE &#160;·&#160;  50 / 24h GLOBAL</text>

  <!-- CTA hint -->
  <text x="40" y="282" fill="#5fb88a"
        font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.04em">→ click anywhere on this panel to open a new issue</text>

  <!-- ─── RIGHT: interferometer rings ─── -->
  <g transform="translate(1000, 160)">
    <!-- Outer expanding ring (animated) -->
    <circle r="80" fill="none" stroke="#f0b67a" stroke-width="0.6" opacity="0">
      <animate attributeName="r" values="40;120;120" keyTimes="0;0.7;1" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0" keyTimes="0;0.7;1" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="60" fill="none" stroke="#f0b67a" stroke-width="0.5" opacity="0">
      <animate attributeName="r" values="40;120;120" keyTimes="0;0.7;1" dur="3.6s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0" keyTimes="0;0.7;1" dur="3.6s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="none" stroke="#f0b67a" stroke-width="0.4" opacity="0">
      <animate attributeName="r" values="40;120;120" keyTimes="0;0.7;1" dur="3.6s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0" keyTimes="0;0.7;1" dur="3.6s" begin="2.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Static guide rings -->
    <circle r="38" fill="none" stroke="#3a4a5e" stroke-width="0.5" opacity="0.6"/>
    <circle r="78" fill="none" stroke="#3a4a5e" stroke-width="0.4" opacity="0.4"/>
    <!-- Crosshair -->
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#3a4a5e" stroke-width="0.4"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke="#3a4a5e" stroke-width="0.4"/>
    <!-- Center transmitter -->
    <circle r="8" fill="#f0b67a">
      <animate attributeName="opacity" values="1;0.5;1" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#fdfaf2"/>
    <!-- Label -->
    <text x="0" y="116" fill="#7a8694" text-anchor="middle"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">XMIT &#160;OK</text>
  </g>
</svg>
