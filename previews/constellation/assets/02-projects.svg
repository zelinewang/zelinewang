<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Observation logs — six stars in detail</title>
  <desc id="desc">Six observation cards, one per project, each showing a small star, coordinates, magnitude/year/notes.</desc>

  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e1822" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070b10" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdfaf2" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fdfaf2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fdfaf2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0b67a" stop-opacity="1"/>
      <stop offset="40%" stop-color="#f0b67a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0b67a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="720" fill="#0a1018"/>
  <rect width="1200" height="720" fill="url(#vignette)"/>

  <!-- ─── Header ─── -->
  <text x="40" y="42" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.28em">OBSERVATION &#160;LOGS</text>
  <text x="1160" y="42" fill="#7a8694" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">FIELD &#160;OF &#160;VIEW &#160;06</text>
  <line x1="40" y1="58" x2="1160" y2="58" stroke="#2a3340" stroke-width="0.5"/>

  <!-- ─── 6 cards in 3×2 grid ─── -->
  <!-- Card width 360, height 280, gutters 30/40 -->
  <!-- Card layout: star (left) + meta block + description -->

  <!-- helper: each card = invisible group, content positioned via translate -->
  <!-- ROW 1 -->

  <!-- CARD α — constellix -->
  <g transform="translate(40, 92)">
    <rect width="370" height="280" fill="#0e1620" stroke="#2a3340" stroke-width="0.5"/>
    <text x="20" y="28" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.3em">α &#160;CONSTELLIX</text>
    <line x1="20" y1="40" x2="350" y2="40" stroke="#2a3340" stroke-width="0.5"/>
    <!-- big star -->
    <circle cx="80" cy="110" r="36" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="110" r="6" fill="#fdfaf2"/>
    <!-- meta -->
    <text x="160" y="80" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">RA &#160;06h 14m</text>
    <text x="160" y="98" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DEC &#160;−05° 22'</text>
    <text x="160" y="124" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">MAG &#160;1.2 (variable)</text>
    <text x="160" y="142" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DISC &#160;2026-04-30</text>
    <!-- description -->
    <text x="20" y="190" fill="#fdfaf2"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="14" font-weight="500">multi-agent orchestration protocol</text>
    <text x="20" y="218" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">each agent specializes; the constellation</text>
    <text x="20" y="234" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">does the work — no single one is enough.</text>
    <text x="350" y="262" fill="#f0b67a" text-anchor="end"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.12em">→ open repo</text>
  </g>

  <!-- CARD β — claudemem -->
  <g transform="translate(420, 92)">
    <rect width="370" height="280" fill="#0e1620" stroke="#2a3340" stroke-width="0.5"/>
    <text x="20" y="28" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.3em">β &#160;CLAUDEMEM</text>
    <line x1="20" y1="40" x2="350" y2="40" stroke="#2a3340" stroke-width="0.5"/>
    <circle cx="80" cy="110" r="32" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4.1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="110" r="5" fill="#fdfaf2"/>
    <text x="160" y="80" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">RA &#160;06h 32m</text>
    <text x="160" y="98" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DEC &#160;−07° 11'</text>
    <text x="160" y="124" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">MAG &#160;1.7</text>
    <text x="160" y="142" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DISC &#160;2026-04-15</text>
    <text x="20" y="190" fill="#fdfaf2"
          font-family="-apple-system, sans-serif" font-size="14" font-weight="500">persistent searchable memory</text>
    <text x="20" y="218" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">SQLite + FTS5 + optional embeddings.</text>
    <text x="20" y="234" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">~570 notes across daily use.</text>
    <text x="350" y="262" fill="#f0b67a" text-anchor="end"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.12em">→ open repo</text>
  </g>

  <!-- CARD γ — dev-orchestrator (the brightest) -->
  <g transform="translate(800, 92)">
    <rect width="370" height="280" fill="#0e1620" stroke="#3a3a2a" stroke-width="0.8"/>
    <text x="20" y="28" fill="#c08858"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.3em">γ &#160;DEV-ORCHESTRATOR</text>
    <line x1="20" y1="40" x2="350" y2="40" stroke="#3a3a2a" stroke-width="0.5"/>
    <circle cx="80" cy="110" r="42" fill="url(#starGlowAmber)">
      <animate attributeName="opacity" values="0.95;1;0.95" dur="3.7s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="110" r="7" fill="#f0b67a"/>
    <text x="160" y="80" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">RA &#160;06h 24m</text>
    <text x="160" y="98" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DEC &#160;−06° 02'</text>
    <text x="160" y="124" fill="#c08858"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">MAG &#160;0.5 (brightest)</text>
    <text x="160" y="142" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DISC &#160;2026-03-01</text>
    <text x="20" y="190" fill="#fdfaf2"
          font-family="-apple-system, sans-serif" font-size="14" font-weight="600">one-command AI dev lifecycle</text>
    <text x="20" y="218" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">/dev — investigate, plan, execute,</text>
    <text x="20" y="234" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">verify, ship. zero approval checkpoints.</text>
    <text x="350" y="262" fill="#f0b67a" text-anchor="end"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.12em">→ open repo</text>
  </g>

  <!-- ROW 2 -->

  <!-- CARD δ — FireSight -->
  <g transform="translate(40, 412)">
    <rect width="370" height="280" fill="#0e1620" stroke="#2a3340" stroke-width="0.5"/>
    <text x="20" y="28" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.3em">δ &#160;FIRESIGHT</text>
    <line x1="20" y1="40" x2="350" y2="40" stroke="#2a3340" stroke-width="0.5"/>
    <circle cx="80" cy="110" r="32" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.9s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="110" r="5" fill="#fdfaf2"/>
    <text x="160" y="80" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">RA &#160;06h 50m</text>
    <text x="160" y="98" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DEC &#160;−06° 41'</text>
    <text x="160" y="124" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">MAG &#160;1.8</text>
    <text x="160" y="142" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DISC &#160;2025-11-12</text>
    <text x="20" y="190" fill="#fdfaf2"
          font-family="-apple-system, sans-serif" font-size="14" font-weight="500">wildfire intelligence + NASA data</text>
    <text x="20" y="218" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">FIRMS satellite passes + weather +</text>
    <text x="20" y="234" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">classifier on a map. AI + maps + signal.</text>
    <text x="350" y="262" fill="#f0b67a" text-anchor="end"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.12em">→ open repo</text>
  </g>

  <!-- CARD ε — PulseConnect -->
  <g transform="translate(420, 412)">
    <rect width="370" height="280" fill="#0e1620" stroke="#2a3340" stroke-width="0.5"/>
    <text x="20" y="28" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.3em">ε &#160;PULSECONNECT</text>
    <line x1="20" y1="40" x2="350" y2="40" stroke="#2a3340" stroke-width="0.5"/>
    <circle cx="80" cy="110" r="28" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4.4s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="110" r="4.5" fill="#fdfaf2"/>
    <text x="160" y="80" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">RA &#160;07h 02m</text>
    <text x="160" y="98" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DEC &#160;−05° 18'</text>
    <text x="160" y="124" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">MAG &#160;2.1</text>
    <text x="160" y="142" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DISC &#160;2025-08-04</text>
    <text x="20" y="190" fill="#fdfaf2"
          font-family="-apple-system, sans-serif" font-size="14" font-weight="500">computer-using AI outreach</text>
    <text x="20" y="218" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">personalized outreach with the human</text>
    <text x="20" y="234" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">firmly in the approval loop.</text>
    <text x="350" y="262" fill="#f0b67a" text-anchor="end"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.12em">→ open repo</text>
  </g>

  <!-- CARD ζ — santorini -->
  <g transform="translate(800, 412)">
    <rect width="370" height="280" fill="#0e1620" stroke="#2a3340" stroke-width="0.5"/>
    <text x="20" y="28" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.3em">ζ &#160;SANTORINI</text>
    <line x1="20" y1="40" x2="350" y2="40" stroke="#2a3340" stroke-width="0.5"/>
    <circle cx="80" cy="110" r="22" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="5.2s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="110" r="3.5" fill="#dde6f0"/>
    <text x="160" y="80" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">RA &#160;05h 41m</text>
    <text x="160" y="98" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DEC &#160;−08° 12'</text>
    <text x="160" y="124" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">MAG &#160;3.2</text>
    <text x="160" y="142" fill="#7a8694"
          font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">DISC &#160;2024-09-22</text>
    <text x="20" y="190" fill="#c0c8d2"
          font-family="-apple-system, sans-serif" font-size="14" font-weight="500">board-game logic, clean rules</text>
    <text x="20" y="218" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">tiny ruleset, deep strategy. the right</text>
    <text x="20" y="234" fill="#a0aab6"
          font-family="-apple-system, sans-serif" font-size="12">shape for clean state machines.</text>
    <text x="350" y="262" fill="#f0b67a" text-anchor="end"
          font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.12em">→ open repo</text>
  </g>

</svg>
