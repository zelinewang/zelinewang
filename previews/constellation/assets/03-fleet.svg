<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Fleet — close-up of the agent constellation</title>
  <desc id="desc">A higher-magnification view of the constellation showing only the fleet agents (Orion, Nova, Sentinel, Designer, Maestro, Scout, Ops) with role labels.</desc>

  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e1822" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070b10" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdfaf2" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fdfaf2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fdfaf2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="480" fill="#0a1018"/>
  <rect width="1200" height="480" fill="url(#vignette)"/>

  <!-- ─── Header ─── -->
  <text x="40" y="42" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.28em">FLEET &#160;DETAIL</text>
  <text x="1160" y="42" fill="#7a8694" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">MAGNIFICATION &#160;3×</text>
  <line x1="40" y1="58" x2="1160" y2="58" stroke="#2a3340" stroke-width="0.5"/>

  <!-- Subtitle -->
  <text x="40" y="92" fill="#fdfaf2"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22" font-weight="500" letter-spacing="-0.01em">The fleet — seven specialists, one constellation</text>
  <text x="40" y="116" fill="#a0aab6"
        font-family="-apple-system, sans-serif" font-size="13">Each agent has a role; the protocol routes work to the right one.</text>

  <!-- Constellation lines connecting agents -->
  <g stroke="#3a4a5e" stroke-width="0.5" opacity="0.5" fill="none">
    <line x1="200" y1="240" x2="380" y2="220"/>
    <line x1="380" y1="220" x2="540" y2="270"/>
    <line x1="540" y1="270" x2="700" y2="220"/>
    <line x1="700" y1="220" x2="860" y2="240"/>
    <line x1="380" y1="220" x2="380" y2="380"/>
    <line x1="540" y1="270" x2="540" y2="380"/>
    <line x1="700" y1="220" x2="700" y2="380"/>
    <line x1="200" y1="240" x2="200" y2="380"/>
  </g>

  <!-- ─── Agents (7) ─── -->

  <!-- Orion (planner) -->
  <circle cx="200" cy="240" r="20" fill="url(#starGlow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="240" r="3.5" fill="#fdfaf2"/>
  <text x="200" y="206" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="0.04em">Orion</text>
  <text x="200" y="288" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">PLANNER</text>
  <text x="200" y="406" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">scope reduction</text>
  <text x="200" y="422" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">absurd-task triage</text>

  <!-- Nova (implementer) -->
  <circle cx="380" cy="220" r="22" fill="url(#starGlow)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4.1s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="220" r="4" fill="#fdfaf2"/>
  <text x="380" y="186" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="0.04em">Nova</text>
  <text x="380" y="268" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">IMPLEMENTER</text>
  <text x="380" y="406" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">runs /dev internally</text>
  <text x="380" y="422" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">honest-failure rule</text>

  <!-- Designer (visual QA) -->
  <circle cx="540" cy="270" r="20" fill="url(#starGlow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4.9s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="270" r="3.5" fill="#fdfaf2"/>
  <text x="540" y="236" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="0.04em">Designer</text>
  <text x="540" y="318" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">VISUAL &#160;QA</text>
  <text x="540" y="406" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">computed-style</text>
  <text x="540" y="422" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">spec then audit</text>

  <!-- Sentinel (reviewer) -->
  <circle cx="700" cy="220" r="22" fill="url(#starGlow)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="5.1s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="220" r="4" fill="#fdfaf2"/>
  <text x="700" y="186" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="0.04em">Sentinel</text>
  <text x="700" y="268" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">REVIEWER</text>
  <text x="700" y="406" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">adversarial</text>
  <text x="700" y="422" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">no LGTM defaults</text>

  <!-- Maestro (post-mortem) -->
  <circle cx="860" cy="240" r="18" fill="url(#starGlow)">
    <animate attributeName="opacity" values="0.7;0.95;0.7" dur="5.6s" begin="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="240" r="3" fill="#dde6f0"/>
  <text x="860" y="208" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="0.04em">Maestro</text>
  <text x="860" y="288" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.16em">POST-MORTEM</text>
  <text x="860" y="406" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">verdict + caps</text>
  <text x="860" y="422" fill="#a0aab6" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11">anti yes-man</text>

  <!-- Scout (research, dimmer = on-demand) -->
  <circle cx="1010" cy="240" r="14" fill="url(#starGlow)">
    <animate attributeName="opacity" values="0.5;0.75;0.5" dur="5.4s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="240" r="2.5" fill="#a0aab6"/>
  <text x="1010" y="216" fill="#c0c8d2" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11" letter-spacing="0.04em">Scout</text>
  <text x="1010" y="270" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.14em">RESEARCH (on-demand)</text>

  <!-- Ops (devops, dimmer) -->
  <circle cx="1010" cy="350" r="14" fill="url(#starGlow)">
    <animate attributeName="opacity" values="0.5;0.75;0.5" dur="5.0s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="350" r="2.5" fill="#a0aab6"/>
  <text x="1010" y="326" fill="#c0c8d2" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11" letter-spacing="0.04em">Ops</text>
  <text x="1010" y="380" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.14em">DEPLOY (on-demand)</text>

  <!-- Footer -->
  <line x1="40" y1="446" x2="1160" y2="446" stroke="#2a3340" stroke-width="0.5"/>
  <text x="40" y="466" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">5 STABLE &#160;·&#160;  2 ON-DEMAND &#160;·&#160;  ALL ON CLAUDE-OPUS-4-7[1M]</text>
  <text x="1160" y="466" fill="#7a8694" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.18em">→ constellix repo</text>
</svg>
