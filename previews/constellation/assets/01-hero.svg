<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Constellix — Zane Wang's project and agent constellation</title>
  <desc id="desc">A starfield with named stars representing Zane's projects and agents. Each star twinkles subtly. The brightest stars are the active projects; dimmer ones are agents or supporting work.</desc>

  <defs>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fdfaf2" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fdfaf2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fdfaf2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f0b67a" stop-opacity="1"/>
      <stop offset="40%" stop-color="#f0b67a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f0b67a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#0e1822" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070b10" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="1200" height="600" fill="#0a1018"/>
  <rect width="1200" height="600" fill="url(#vignette)"/>

  <!-- Background dust stars (decorative, no labels) -->
  <g fill="#dde6f0" opacity="0.35">
    <circle cx="40"   cy="80"  r="0.6"/>
    <circle cx="120"  cy="220" r="0.8"/>
    <circle cx="180"  cy="50"  r="0.5"/>
    <circle cx="280"  cy="540" r="0.7"/>
    <circle cx="380"  cy="40"  r="0.6"/>
    <circle cx="450"  cy="490" r="0.8"/>
    <circle cx="520"  cy="120" r="0.5"/>
    <circle cx="610"  cy="55"  r="0.7"/>
    <circle cx="700"  cy="540" r="0.6"/>
    <circle cx="790"  cy="180" r="0.5"/>
    <circle cx="860"  cy="40"  r="0.8"/>
    <circle cx="940"  cy="510" r="0.6"/>
    <circle cx="1020" cy="120" r="0.7"/>
    <circle cx="1100" cy="270" r="0.5"/>
    <circle cx="1150" cy="480" r="0.8"/>
    <circle cx="60"   cy="340" r="0.6"/>
    <circle cx="220"  cy="370" r="0.5"/>
    <circle cx="730"  cy="360" r="0.7"/>
    <circle cx="990"  cy="380" r="0.6"/>
  </g>

  <!-- Constellation lines connecting major stars (faint) -->
  <g stroke="#3a4a5e" stroke-width="0.8" opacity="0.6" fill="none">
    <line x1="270" y1="200" x2="450" y2="270"/>
    <line x1="450" y1="270" x2="600" y2="320"/>
    <line x1="600" y1="320" x2="750" y2="270"/>
    <line x1="750" y1="270" x2="930" y2="200"/>
    <line x1="600" y1="320" x2="540" y2="450"/>
    <line x1="600" y1="320" x2="660" y2="450"/>
    <line x1="270" y1="200" x2="190" y2="380"/>
    <line x1="930" y1="200" x2="1010" y2="380"/>
  </g>

  <!-- ─────────────────────────────────────────────────── -->
  <!-- MAJOR STARS (projects)                               -->
  <!-- Each: glow halo + bright core + label + twinkle      -->
  <!-- Twinkle timings staggered so they don't pulse in unison -->
  <!-- ─────────────────────────────────────────────────── -->

  <!-- 1. constellix — top-left brightest project -->
  <g>
    <circle cx="270" cy="200" r="22" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="200" r="3.5" fill="#fdfaf2">
      <animate attributeName="r" values="3.5;4.2;3.5" dur="3.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="270" y="172" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="14" font-weight="500" letter-spacing="0.05em">constellix</text>
  <text x="270" y="240" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace" font-size="9" letter-spacing="0.18em">α · the constellation</text>

  <!-- 2. claudemem -->
  <g>
    <circle cx="450" cy="270" r="20" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4.1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="270" r="3.2" fill="#fdfaf2">
      <animate attributeName="r" values="3.2;3.9;3.2" dur="4.1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="450" y="245" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="13" font-weight="500" letter-spacing="0.05em">claudemem</text>
  <text x="450" y="305" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.18em">β · the memory</text>

  <!-- 3. dev-orchestrator (CENTER, brightest star — amber accent) -->
  <g>
    <circle cx="600" cy="320" r="28" fill="url(#starGlowAmber)">
      <animate attributeName="opacity" values="0.95;1;0.95" dur="3.7s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="320" r="4.5" fill="#f0b67a">
      <animate attributeName="r" values="4.5;5.2;4.5" dur="3.7s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="600" y="290" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="15" font-weight="600" letter-spacing="0.05em">dev-orchestrator</text>
  <text x="600" y="358" fill="#c08858" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.18em">γ · the protocol</text>

  <!-- 4. FireSight -->
  <g>
    <circle cx="750" cy="270" r="20" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.9s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="270" r="3.2" fill="#fdfaf2">
      <animate attributeName="r" values="3.2;3.9;3.2" dur="3.9s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="750" y="245" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="13" font-weight="500" letter-spacing="0.05em">FireSight</text>
  <text x="750" y="305" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.18em">δ · the eye</text>

  <!-- 5. PulseConnect (top-right) -->
  <g>
    <circle cx="930" cy="200" r="18" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4.4s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="200" r="3" fill="#fdfaf2">
      <animate attributeName="r" values="3;3.6;3" dur="4.4s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="930" y="175" fill="#fdfaf2" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="13" font-weight="500" letter-spacing="0.05em">PulseConnect</text>
  <text x="930" y="235" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.18em">ε · the outreach</text>

  <!-- 6. santorini (bottom-left, smaller) -->
  <g>
    <circle cx="190" cy="380" r="15" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="5.2s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="380" r="2.5" fill="#dde6f0">
      <animate attributeName="r" values="2.5;3.2;2.5" dur="5.2s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="190" y="412" fill="#c0c8d2" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="11" font-weight="400" letter-spacing="0.05em">santorini</text>

  <!-- ─────────────────────────────────────────────────── -->
  <!-- AGENT STARS (smaller, dimmer — fleet members)        -->
  <!-- ─────────────────────────────────────────────────── -->

  <!-- Orion (the planner) -->
  <g>
    <circle cx="540" cy="450" r="11" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.6;0.85;0.6" dur="4.7s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="450" r="2" fill="#dde6f0"/>
  </g>
  <text x="540" y="478" fill="#a0aab6" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.05em">Orion</text>

  <!-- Nova (the implementer) -->
  <g>
    <circle cx="600" cy="465" r="10" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.6;0.85;0.6" dur="4.3s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="465" r="2" fill="#dde6f0"/>
  </g>
  <text x="600" y="493" fill="#a0aab6" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.05em">Nova</text>

  <!-- Sentinel (the reviewer) -->
  <g>
    <circle cx="660" cy="450" r="10" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.6;0.85;0.6" dur="5.1s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="450" r="2" fill="#dde6f0"/>
  </g>
  <text x="660" y="478" fill="#a0aab6" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.05em">Sentinel</text>

  <!-- Designer -->
  <g>
    <circle cx="1010" cy="380" r="11" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.6;0.85;0.6" dur="4.9s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1010" cy="380" r="2" fill="#dde6f0"/>
  </g>
  <text x="1010" y="408" fill="#a0aab6" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.05em">Designer</text>

  <!-- Maestro -->
  <g>
    <circle cx="1080" cy="450" r="9" fill="url(#starGlow)">
      <animate attributeName="opacity" values="0.55;0.8;0.55" dur="5.6s" begin="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="450" r="1.8" fill="#dde6f0"/>
  </g>
  <text x="1080" y="476" fill="#a0aab6" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.05em">Maestro</text>

  <!-- ─────────────────────────────────────────────────── -->
  <!-- TITLE BAR (top)                                     -->
  <!-- ─────────────────────────────────────────────────── -->
  <text x="40" y="48" fill="#7a8694"
        font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="0.28em">CONSTELLIX</text>
  <text x="1160" y="48" fill="#7a8694" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="0.28em">RA 06h · DEC −05°</text>

  <!-- ─────────────────────────────────────────────────── -->
  <!-- FOOTER LINE                                          -->
  <!-- ─────────────────────────────────────────────────── -->
  <line x1="40" y1="556" x2="1160" y2="556" stroke="#2a3340" stroke-width="0.5"/>
  <text x="600" y="582" fill="#9aa6b4" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', serif"
        font-style="italic" font-size="14" letter-spacing="0.04em">
    each agent is a star. the constellation does the work.
  </text>
</svg>
