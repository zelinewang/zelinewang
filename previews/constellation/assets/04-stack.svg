<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Working set — spectroscopic readout</title>
  <desc id="desc">A spectroscopic-style visualization of Zane's tech stack — categorized bands of color with named tools as absorption lines.</desc>

  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e1822" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070b10" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Spectrum gradient for the visual band -->
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5b3aa8"/>
      <stop offset="20%"  stop-color="#3a6aa8"/>
      <stop offset="40%"  stop-color="#3aa888"/>
      <stop offset="60%"  stop-color="#a8a83a"/>
      <stop offset="80%"  stop-color="#c0623c"/>
      <stop offset="100%" stop-color="#a83a3a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="#0a1018"/>
  <rect width="1200" height="360" fill="url(#vignette)"/>

  <text x="40" y="42" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.28em">SPECTRAL &#160;ANALYSIS</text>
  <text x="1160" y="42" fill="#7a8694" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.18em">SUBJECT &#160;ZW-001</text>
  <line x1="40" y1="58" x2="1160" y2="58" stroke="#2a3340" stroke-width="0.5"/>

  <text x="40" y="92" fill="#fdfaf2"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22" font-weight="500" letter-spacing="-0.01em">Working set</text>
  <text x="40" y="116" fill="#a0aab6"
        font-family="-apple-system, sans-serif" font-size="13">Tool fit over logo walls — what shows up most often, by domain.</text>

  <!-- Spectrum band (the visual centerpiece) -->
  <rect x="40" y="160" width="1120" height="36" fill="url(#spectrum)" opacity="0.85"/>
  <!-- Tick marks for the absorption lines (vertical black lines = "tools present") -->
  <g stroke="#0a1018" stroke-width="2.5">
    <!-- LANG band ticks -->
    <line x1="80"  y1="155" x2="80"  y2="201"/>
    <line x1="115" y1="155" x2="115" y2="201"/>
    <line x1="155" y1="155" x2="155" y2="201"/>
    <line x1="195" y1="155" x2="195" y2="201"/>
    <line x1="225" y1="155" x2="225" y2="201"/>
    <line x1="248" y1="155" x2="248" y2="201"/>
    <!-- WEB band ticks -->
    <line x1="490" y1="155" x2="490" y2="201"/>
    <line x1="540" y1="155" x2="540" y2="201"/>
    <!-- INFRA band ticks -->
    <line x1="690" y1="155" x2="690" y2="201"/>
    <line x1="730" y1="155" x2="730" y2="201"/>
    <!-- SPATIAL tick -->
    <line x1="900" y1="155" x2="900" y2="201"/>
    <!-- HARDWARE tick -->
    <line x1="1080" y1="155" x2="1080" y2="201"/>
  </g>

  <!-- Domain labels above the band -->
  <text x="160" y="148" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">LANGUAGES</text>
  <text x="515" y="148" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">WEB</text>
  <text x="710" y="148" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">INFRA</text>
  <text x="900" y="148" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">SPATIAL</text>
  <text x="1080" y="148" fill="#7a8694" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.22em">HARDWARE</text>

  <!-- Tool names below the band, lined up with ticks -->
  <text x="80"  y="222" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">python</text>
  <text x="115" y="240" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">go</text>
  <text x="155" y="222" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">typescript</text>
  <text x="195" y="240" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">javascript</text>
  <text x="225" y="222" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">java</text>
  <text x="248" y="240" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">c++</text>

  <text x="490" y="222" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">react</text>
  <text x="540" y="240" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">node.js</text>

  <text x="690" y="222" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">docker</text>
  <text x="730" y="240" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">linux</text>

  <text x="900" y="222" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">qgis</text>

  <text x="1080" y="222" fill="#fdfaf2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">raspberry pi</text>

  <!-- X-axis (wavelength scale) -->
  <line x1="40" y1="280" x2="1160" y2="280" stroke="#3a4a5e" stroke-width="0.5"/>
  <text x="40" y="298" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.16em">low &#160;←  abstraction  →  high</text>
  <text x="1160" y="298" text-anchor="end" fill="#7a8694"
        font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.16em">12 &#160;TOOLS &#160;·  5 &#160;DOMAINS</text>

  <!-- Footer line -->
  <line x1="40" y1="324" x2="1160" y2="324" stroke="#2a3340" stroke-width="0.5"/>
  <text x="600" y="346" fill="#9aa6b4" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', serif"
        font-style="italic" font-size="13" letter-spacing="0.02em">
    quick prototypes when the idea is unstable; durable systems when the shape is clear.
  </text>
</svg>
