<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="heroTitle heroDesc" preserveAspectRatio="xMidYMid meet">
  <title id="heroTitle">Zane Wang — building useful systems for fuzzy problems</title>
  <desc id="heroDesc">Editorial hero card with a quiet animated signal indicating the profile is live.</desc>

  <defs>
    <!-- Warm OKLCH-derived palette, baked into hex for SVG image-tag compatibility -->
    <!-- ink: oklch(20% 0.015 50) ≈ #1f1c17  /  paper: oklch(98% 0.008 80) ≈ #faf8f3 -->
    <!-- mute: oklch(58% 0.012 60) ≈ #8a807a  /  accent (rust): oklch(58% 0.16 35) ≈ #c0623c -->
    <linearGradient id="paperWash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f3"/>
      <stop offset="60%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#ede8de"/>
    </linearGradient>

    <radialGradient id="accentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0623c" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#c0623c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c0623c" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .display { font-family: ui-serif, "Iowan Old Style", "Hoefler Text", "Times New Roman", serif; font-weight: 500; letter-spacing: -0.015em; fill: #1f1c17; }
      .body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif; fill: #1f1c17; }
      .mute { fill: #8a807a; }
      .mono { font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace; }
      .accent { fill: #c0623c; }

      .pulse { transform-origin: 64px 222px; animation: pulse 2.6s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.55); opacity: 0.45; }
      }

      .pulse-ring { transform-origin: 64px 222px; animation: ring 2.6s ease-out infinite; opacity: 0; }
      @keyframes ring {
        0% { transform: scale(1); opacity: 0.55; }
        70%, 100% { transform: scale(3.2); opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .pulse, .pulse-ring { animation: none; }
      }
    ]]></style>
  </defs>

  <!-- Paper background with subtle wash -->
  <rect width="1200" height="420" fill="url(#paperWash)"/>

  <!-- Off-page accent glow, anchored bottom-right -->
  <circle cx="1080" cy="360" r="220" fill="url(#accentGlow)"/>

  <!-- Editorial top bar: section index + small location -->
  <g class="body" font-size="13" letter-spacing="0.18em">
    <text x="64" y="62" class="mute"><tspan class="mono">00</tspan> &#160;&#160;PROFILE&#160;/&#160;ZANE&#160;WANG</text>
    <text x="1136" y="62" text-anchor="end" class="mute mono">EST.&#160;2021</text>
  </g>

  <!-- Hairline rule under top bar -->
  <line x1="64" y1="84" x2="1136" y2="84" stroke="#1f1c17" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Display headline (left-aligned, NOT centered) -->
  <g class="display">
    <text x="64" y="170" font-size="78">Zane Wang</text>
  </g>

  <!-- Tagline kicker -->
  <text x="64" y="210" class="body mute" font-size="15" letter-spacing="0.04em">
    AI agents · agent memory · maps · hardware-aware software · developer tools
  </text>

  <!-- Live signal cluster — left side, restrained -->
  <g>
    <!-- pulsing ring -->
    <circle class="pulse-ring" cx="64" cy="222" r="6" fill="none" stroke="#c0623c" stroke-width="1"/>
    <!-- pulsing dot -->
    <circle class="pulse" cx="64" cy="222" r="4" fill="#c0623c"/>
  </g>
  <text x="78" y="226" class="body mute mono" font-size="11" letter-spacing="0.12em">SIGNAL&#160;LIVE</text>

  <!-- Manifesto line -->
  <text x="64" y="290" class="body" font-size="22" font-weight="400" letter-spacing="-0.005em">
    <tspan>I build useful systems for fuzzy problems —</tspan>
  </text>
  <text x="64" y="322" class="body" font-size="22" font-weight="400" letter-spacing="-0.005em">
    <tspan>agents that remember, maps that explain, tools that remove friction,</tspan>
  </text>
  <text x="64" y="354" class="body" font-size="22" font-weight="400" letter-spacing="-0.005em">
    <tspan>and prototypes with enough personality to make the demo worth finishing.</tspan>
  </text>

  <!-- Bottom hairline + footer -->
  <line x1="64" y1="384" x2="1136" y2="384" stroke="#1f1c17" stroke-opacity="0.10" stroke-width="1"/>
  <g class="body mono" font-size="11" letter-spacing="0.18em">
    <text x="64" y="404" class="mute">CURRENT&#160;MODE</text>
    <text x="172" y="404" class="accent">SHIPPING</text>
    <text x="1136" y="404" text-anchor="end" class="mute">SCROLL&#160;&#x2193;</text>
  </g>
</svg>
