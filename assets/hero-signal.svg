<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="heroTitle heroDesc" preserveAspectRatio="xMidYMid meet">
  <title id="heroTitle">Zane Wang — turning fuzzy AI workflows into observable systems</title>
  <desc id="heroDesc">Editorial hero connecting production evaluation with public agent infrastructure. A small accent dot pulses to indicate the profile is live.</desc>

  <defs>
    <!-- Warm OKLCH-derived palette, baked into hex for SVG image-tag compatibility -->
    <linearGradient id="paperWash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f3"/>
      <stop offset="60%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#ede8de"/>
    </linearGradient>

    <radialGradient id="accentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0623c" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#c0623c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c0623c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Paper background with subtle wash -->
  <rect width="1200" height="360" fill="url(#paperWash)"/>

  <!-- Off-page accent glow, anchored bottom-right -->
  <circle cx="1080" cy="320" r="220" fill="url(#accentGlow)"/>

  <!-- Hairline rule under top -->
  <line x1="64" y1="68" x2="1136" y2="68" stroke="#1f1c17" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Top index — single line, no decorative chrome -->
  <text x="64" y="50" fill="#8a807a"
        font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="12" letter-spacing="0.22em">PROFILE&#160;/&#160;ZANE&#160;WANG</text>

  <!-- Display headline (left-aligned, NOT centered)
       Cross-platform serif chain: Charter (macOS/iOS), Iowan Old Style (macOS/iOS),
       Source Serif Pro (designer-installed), Cambria (Windows), Georgia (universal floor).
       NOTE: 'ui-serif' deliberately avoided — Safari-only behavior, falls to Times on Chrome. -->
  <text x="64" y="170" fill="#1f1c17"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="84" font-weight="500" letter-spacing="-0.02em">Zane Wang</text>

  <!-- Tagline kicker -->
  <text x="64" y="208" fill="#8a807a"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif"
        font-size="15" letter-spacing="0.04em">
    AI systems · evaluation · agent infrastructure · product experiments
  </text>

  <!-- Live signal cluster — uses native SVG <animate> so it renders inside <img> on GitHub -->
  <g>
    <!-- expanding ring -->
    <circle cx="64" cy="244" r="6" fill="none" stroke="#c0623c" stroke-width="1" opacity="0">
      <animate attributeName="r" from="6" to="20" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0;0" keyTimes="0;0.7;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <!-- pulsing dot -->
    <circle cx="64" cy="244" r="4" fill="#c0623c">
      <animate attributeName="r" values="4;6.5;4" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.55;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="80" y="248" fill="#8a807a"
        font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="11" letter-spacing="0.16em">SIGNAL&#160;LIVE</text>

  <!-- Manifesto -->
  <text x="64" y="300" fill="#1f1c17"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="22" font-style="italic" font-weight="400" letter-spacing="-0.005em">
    I turn fuzzy AI workflows into observable, testable systems.
  </text>

  <!-- Bottom hairline -->
  <line x1="64" y1="332" x2="1136" y2="332" stroke="#1f1c17" stroke-opacity="0.12" stroke-width="1"/>
</svg>
