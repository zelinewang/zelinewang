<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ZaneOS Arcade dashboard</title>
  <desc id="desc">A frontend-like GitHub profile dashboard for Zane Wang, showing ZaneOS Sidekick, capability quests, and a contribution snake motif.</desc>
  <foreignObject width="1200" height="720">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          color-scheme: light dark;
          --ink: #18211f;
          --muted: #66716b;
          --paper: #fff9ed;
          --paper-2: #f4eee2;
          --line: rgba(24, 33, 31, .14);
          --teal: #1b7c76;
          --rust: #b45b38;
          --gold: #d6a73d;
          --sage: #e8efe8;
          --shadow: rgba(24, 33, 31, .14);
          --serif: ui-serif, Georgia, "Times New Roman", serif;
          --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        }

        * { box-sizing: border-box; }

        body {
          margin: 0;
        }

        .frame {
          width: 1200px;
          height: 720px;
          overflow: hidden;
          border-radius: 34px;
          background:
            radial-gradient(circle at 88% 6%, rgba(27, 124, 118, .22), transparent 270px),
            radial-gradient(circle at 12% 80%, rgba(214, 167, 61, .24), transparent 300px),
            linear-gradient(135deg, var(--paper), var(--paper-2) 55%, var(--sage));
          color: var(--ink);
          font-family: var(--sans);
          padding: 38px 48px 42px;
        }

        .window {
          height: 100%;
          border: 1px solid var(--line);
          border-radius: 30px;
          background: rgba(255, 249, 237, .64);
          box-shadow: 0 28px 80px var(--shadow);
          overflow: hidden;
        }

        .bar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          height: 62px;
          border-bottom: 1px solid var(--line);
          padding: 0 24px;
          font-family: var(--mono);
          font-size: 13px;
          font-weight: 800;
          letter-spacing: .08em;
          color: var(--muted);
          text-transform: uppercase;
        }

        .dots {
          display: flex;
          gap: 8px;
        }

        .dots span {
          width: 11px;
          height: 11px;
          border-radius: 50%;
          background: var(--rust);
        }

        .dots span:nth-child(2) { background: var(--gold); }
        .dots span:nth-child(3) { background: var(--teal); }

        .content {
          display: grid;
          grid-template-columns: 1.03fr .97fr;
          gap: 38px;
          padding: 42px 42px 36px;
        }

        .eyebrow {
          margin: 0 0 14px;
          color: var(--rust);
          font-family: var(--mono);
          font-size: 13px;
          font-weight: 900;
          letter-spacing: .12em;
          text-transform: uppercase;
        }

        h1 {
          max-width: 560px;
          margin: 0 0 18px;
          font-family: var(--serif);
          font-size: 76px;
          font-weight: 650;
          letter-spacing: -5.8px;
          line-height: .89;
        }

        .lead {
          max-width: 548px;
          margin: 0;
          color: #3f4d48;
          font-size: 21px;
          line-height: 1.42;
        }

        .terminal {
          margin-top: 30px;
          border-radius: 24px;
          background: #18211f;
          color: #fff9ed;
          padding: 20px 22px;
          font-family: var(--mono);
          font-size: 16px;
          line-height: 1.9;
        }

        .prompt { color: var(--gold); }
        .good { color: #9ed8c7; }

        .quest-row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
          margin-top: 18px;
        }

        .quest {
          position: relative;
          min-height: 112px;
          overflow: hidden;
          border: 1px solid var(--line);
          border-radius: 22px;
          background: rgba(255, 255, 255, .36);
          padding: 16px;
        }

        .quest:after {
          position: absolute;
          right: 14px;
          bottom: 6px;
          color: rgba(24, 33, 31, .08);
          content: attr(data-code);
          font-family: var(--serif);
          font-size: 58px;
          font-weight: 900;
          letter-spacing: -5px;
        }

        .quest strong,
        .mode strong {
          display: block;
          margin-bottom: 7px;
          font-size: 16px;
        }

        .quest span,
        .mode span {
          display: block;
          color: var(--muted);
          font-size: 13px;
          line-height: 1.36;
        }

        .side {
          display: grid;
          gap: 14px;
        }

        .panel {
          border: 1px solid var(--line);
          border-radius: 26px;
          background: rgba(255, 249, 237, .72);
          padding: 22px;
        }

        .panel h2 {
          margin: 0 0 8px;
          font-family: var(--serif);
          font-size: 38px;
          font-weight: 650;
          letter-spacing: -2.5px;
        }

        .panel p {
          margin: 0;
          color: var(--muted);
          font-size: 15px;
          line-height: 1.45;
        }

        .modes {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          margin-top: 18px;
        }

        .mode {
          min-height: 78px;
          border: 1px solid var(--line);
          border-radius: 18px;
          background: rgba(255, 255, 255, .34);
          padding: 14px;
        }

        .mode strong {
          font-family: var(--mono);
          font-size: 12px;
          letter-spacing: .1em;
        }

        .snake {
          display: grid;
          grid-template-columns: 1fr auto;
          gap: 16px;
          align-items: center;
          margin-top: 18px;
          border-radius: 20px;
          background: #18211f;
          padding: 16px;
        }

        .track {
          height: 58px;
          border: 1px solid rgba(255, 249, 237, .11);
          border-radius: 16px;
          background:
            linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px),
            linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
          background-size: 18px 18px;
          position: relative;
          overflow: hidden;
        }

        .track:before {
          position: absolute;
          top: 24px;
          left: 22px;
          width: 75%;
          height: 10px;
          border-radius: 999px;
          background: linear-gradient(90deg, var(--teal), var(--gold), var(--rust));
          content: "";
          animation: snake 2.8s ease-in-out infinite alternate;
        }

        .track:after {
          position: absolute;
          top: 16px;
          left: 75%;
          width: 25px;
          height: 25px;
          border-radius: 50%;
          background: var(--rust);
          content: "";
        }

        .score {
          border-radius: 999px;
          background: #fff9ed;
          color: #18211f;
          font-family: var(--mono);
          font-size: 13px;
          font-weight: 900;
          padding: 10px 13px;
          white-space: nowrap;
        }

        .chips {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin-top: 14px;
        }

        .chips span {
          border: 1px solid var(--line);
          border-radius: 999px;
          background: rgba(255,255,255,.38);
          color: var(--ink);
          font-size: 12px;
          font-weight: 800;
          padding: 8px 10px;
        }

        @keyframes snake {
          from { transform: translateX(-8px) scaleX(.96); }
          to { transform: translateX(14px) scaleX(1.03); }
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --ink: #f7f1e4;
            --muted: #c4cdbc;
            --paper: #161c19;
            --paper-2: #202820;
            --line: rgba(247, 241, 228, .16);
            --shadow: rgba(0, 0, 0, .4);
          }
          .frame { background: linear-gradient(135deg, #131916, #222a22 62%, #2e281c); }
          .window, .panel { background: rgba(22, 28, 25, .72); }
          .lead { color: #d5dccd; }
          .quest, .mode, .chips span { background: rgba(255,255,255,.05); }
        }

        @media (prefers-reduced-motion: reduce) {
          .track:before { animation: none; }
        }
      </style>

      <main class="frame">
        <section class="window">
          <div class="bar">
            <span>zelinewang / zelinewang · README as frontend shell</span>
            <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
          </div>

          <div class="content">
            <section>
              <p class="eyebrow">Personal OS with playable edges</p>
              <h1>ZaneOS, now with side quests.</h1>
              <p class="lead">AI systems, agent memory, maps, hardware instincts, and developer tools — organized like a calm command center with arcade-grade personality.</p>

              <div class="terminal" aria-label="ZaneOS terminal preview">
                <div><span class="prompt">&gt;</span> zaneos ask "what is Zane weirdly good at?"</div>
                <div><span class="prompt">&gt;</span> zaneos match @octocat</div>
                <div class="good">overlap: maps + agents + useful chaos</div>
              </div>

              <div class="quest-row">
                <div class="quest" data-code="01"><strong>Quest cards, not badge carpet</strong><span>Public projects become missions with proof, flavor, and a reason to click.</span></div>
                <div class="quest" data-code="02"><strong>Username overlap finder</strong><span>Visitors can open a GitHub issue side quest and get an automatic match response.</span></div>
              </div>
            </section>

            <aside class="side">
              <div class="panel">
                <p class="eyebrow">ZaneOS Sidekick</p>
                <h2>Ask. Match. Quest. Boop.</h2>
                <p>README stays fast. GitHub Actions handle interaction. SVG carries the frontend-like design layer.</p>
                <div class="modes">
                  <div class="mode"><strong>ASK</strong><span>Short public-signal answer.</span></div>
                  <div class="mode"><strong>MATCH</strong><span>Compare a username with Zane.</span></div>
                  <div class="mode"><strong>QUEST</strong><span>Turn repos into missions.</span></div>
                  <div class="mode"><strong>BOOP</strong><span>One useful strange idea.</span></div>
                </div>
              </div>

              <div class="panel">
                <p class="eyebrow">Build snake signal</p>
                <p>Contribution snake stays as a signature motif; the actual animation is generated by GitHub Actions.</p>
                <div class="snake">
                  <div class="track"></div>
                  <div class="score">score +1</div>
                </div>
                <div class="chips">
                  <span>agents</span><span>memory</span><span>maps</span><span>hardware</span><span>devtools</span><span>play</span>
                </div>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>
  </foreignObject>
</svg>
