<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="heroTitle heroDesc" preserveAspectRatio="xMidYMid meet">
  <title id="heroTitle">Zane Wang — building useful systems for fuzzy problems</title>
  <desc id="heroDesc">Editorial hero card (dark mode). A small accent dot pulses to indicate the profile is live.</desc>

  <defs>
    <linearGradient id="paperWashDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14110d"/>
      <stop offset="60%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#211c17"/>
    </linearGradient>

    <radialGradient id="accentGlowDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0623c" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#c0623c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c0623c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#paperWashDark)"/>
  <circle cx="1080" cy="320" r="220" fill="url(#accentGlowDark)"/>

  <line x1="64" y1="68" x2="1136" y2="68" stroke="#efebe2" stroke-opacity="0.12" stroke-width="1"/>

  <text x="64" y="50" fill="#807871"
        font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="12" letter-spacing="0.22em">PROFILE&#160;/&#160;ZANE&#160;WANG</text>

  <text x="64" y="170" fill="#efebe2"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="84" font-weight="500" letter-spacing="-0.02em">Zane Wang</text>

  <text x="64" y="208" fill="#807871"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif"
        font-size="15" letter-spacing="0.04em">
    AI systems · agent memory · delegation · product experiments
  </text>

  <g>
    <circle cx="64" cy="244" r="6" fill="none" stroke="#d97a52" stroke-width="1" opacity="0">
      <animate attributeName="r" from="6" to="20" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0;0" keyTimes="0;0.7;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="244" r="4" fill="#d97a52">
      <animate attributeName="r" values="4;6.5;4" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.55;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="80" y="248" fill="#807871"
        font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="11" letter-spacing="0.16em">SIGNAL&#160;LIVE</text>

  <text x="64" y="300" fill="#efebe2"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="22" font-style="italic" font-weight="400" letter-spacing="-0.005em">
    I build useful systems for fuzzy problems.
  </text>

  <line x1="64" y1="332" x2="1136" y2="332" stroke="#efebe2" stroke-opacity="0.12" stroke-width="1"/>
</svg>
